<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stat Cards - Option 2: Holographic</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #FF6B2C;
            --cyan: #00E5FF;
            --magenta: #FF00E5;
            --lime: #AAFF00;
            --black: #0D0D0D;
            --dark: #151515;
            --white: #FFFFFF;
            --gray: #8A8A8A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--black);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        h1 {
            position: fixed;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Bebas Neue', sans-serif;
            color: var(--white);
            font-size: 1.5rem;
            letter-spacing: 0.1em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            max-width: 1200px;
            width: 100%;
        }

        .stat-card {
            background: linear-gradient(135deg,
                rgba(255, 107, 44, 0.1) 0%,
                rgba(0, 229, 255, 0.05) 50%,
                rgba(255, 0, 229, 0.1) 100%);
            border-radius: 20px;
            padding: 2.5rem 1.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 40%,
                rgba(255, 255, 255, 0.03) 45%,
                rgba(255, 255, 255, 0.05) 50%,
                rgba(255, 255, 255, 0.03) 55%,
                transparent 60%
            );
            animation: shimmer 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .stat-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                135deg,
                rgba(255, 107, 44, 0.2) 0%,
                transparent 25%,
                rgba(0, 229, 255, 0.2) 50%,
                transparent 75%,
                rgba(255, 0, 229, 0.2) 100%
            );
            background-size: 400% 400%;
            animation: holoShift 8s ease infinite;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
            border-radius: 20px;
        }

        @keyframes holoShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .stat-card:hover::after {
            opacity: 1;
        }

        .stat-card:hover {
            transform: translateY(-8px) rotateX(5deg);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow:
                0 20px 40px rgba(0, 0, 0, 0.4),
                0 0 30px rgba(255, 107, 44, 0.1),
                0 0 60px rgba(0, 229, 255, 0.1);
        }

        .stat-icon {
            width: 70px;
            height: 70px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: linear-gradient(135deg, rgba(255, 107, 44, 0.2), rgba(0, 229, 255, 0.2));
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-icon svg {
            width: 32px;
            height: 32px;
            color: var(--white);
        }

        .stat-number {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--orange), var(--cyan), var(--magenta));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientText 4s ease infinite;
        }

        @keyframes gradientText {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .stat-number.animate {
            animation: gradientText 4s ease infinite, numberPop 0.4s ease;
        }

        @keyframes numberPop {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        /* Scan lines effect */
        .stat-card .scanlines {
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.1) 2px,
                rgba(0, 0, 0, 0.1) 4px
            );
            pointer-events: none;
            opacity: 0.3;
            border-radius: 20px;
        }

        @media (max-width: 900px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 500px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <h1>OPTION 2: HOLOGRAPHIC CARDS</h1>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="scanlines"></div>
            <div class="stat-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <path d="M3 9h18M9 21V9"/>
                </svg>
            </div>
            <div class="stat-number">25+</div>
            <div class="stat-label">Challenge Rooms</div>
        </div>

        <div class="stat-card">
            <div class="scanlines"></div>
            <div class="stat-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12,6 12,12 16,14"/>
                </svg>
            </div>
            <div class="stat-number" id="minutes">60</div>
            <div class="stat-label">Minutes of Play</div>
        </div>

        <div class="stat-card">
            <div class="scanlines"></div>
            <div class="stat-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
            </div>
            <div class="stat-number">2-5</div>
            <div class="stat-label">Players Per Team</div>
        </div>

        <div class="stat-card">
            <div class="scanlines"></div>
            <div class="stat-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                    <circle cx="12" cy="10" r="3"/>
                </svg>
            </div>
            <div class="stat-number">7</div>
            <div class="stat-label">Global Locations</div>
        </div>
    </div>

    <script>
        const minutesEl = document.getElementById('minutes');
        const options = [60, 90, 120];
        let idx = 0;

        setInterval(() => {
            idx = (idx + 1) % options.length;
            minutesEl.classList.add('animate');
            minutesEl.textContent = options[idx];
            setTimeout(() => minutesEl.classList.remove('animate'), 400);
        }, 2500);
    </script>
</body>
</html>
