# Cloudflare Pages — CLI deploy (no GitHub integration required).
#
# First-time setup:
#   1. npx wrangler login
#   2. Create the project if needed: npx wrangler pages project create time-mission-website
#   3. npm run deploy:pages
#
# Different Pages project without editing name below:
#   npm run deploy:pages -- --project-name=my-staging-site
# Hero MP4s on R2 (Pages 25 MiB/file limit): copy `.env.example` → `.env` and set
# PUBLIC_TM_MEDIA_BASE to your public bucket URL (no trailing slash). Object keys in R2
# must match site paths, e.g. `assets/video/hero-bg-web.mp4`.
#
# Hero video playback from R2: ensure the bucket CORS rule allows GET (and OPTIONS if used)
# from your web origin (`https://timemission.com` or `*`) — Safari relies on ranged requests over HTTPS.
#
name = "time-mission-website"
pages_build_output_dir = "dist"
