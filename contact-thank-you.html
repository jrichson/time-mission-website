<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Message Sent | Time Mission</title>
    <meta name="description" content="Thanks for contacting Time Mission. We received your message and will respond soon.">
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/png" href="assets/logo/TM_Favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <style>
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 2rem;
            background:
                radial-gradient(circle at 20% 20%, rgba(255, 107, 44, 0.18), transparent 32rem),
                radial-gradient(circle at 80% 10%, rgba(0, 229, 255, 0.12), transparent 28rem),
                var(--black);
        }

        .thank-you-card {
            max-width: 620px;
            padding: clamp(2rem, 5vw, 4rem);
            border: 1px solid rgba(255, 107, 44, 0.24);
            border-radius: 24px;
            background: rgba(21, 21, 21, 0.86);
            text-align: center;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
        }

        .thank-you-card h1 {
            font-family: var(--display);
            font-size: clamp(3rem, 10vw, 6rem);
            line-height: 0.9;
            letter-spacing: 0.02em;
            margin-bottom: 1rem;
        }

        .thank-you-card p {
            color: var(--gray);
            line-height: 1.7;
            margin-bottom: 2rem;
        }

        .thank-you-card a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.9rem 1.4rem;
            border-radius: 999px;
            background: var(--gradient-primary);
            color: var(--white);
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
    </style>
</head>
<body>
    <main class="thank-you-card">
        <h1>Message Sent</h1>
        <p>Thanks for reaching out. The Time Mission team received your message and will get back to you within 24-48 hours.</p>
        <a href="/">Back to Home</a>
    </main>
    <script src="js/a11y.js"></script>
</body>
</html>
