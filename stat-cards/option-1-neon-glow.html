<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stat Cards - Option 1: Neon Glow</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #FF6B2C;
            --cyan: #00E5FF;
            --magenta: #FF00E5;
            --lime: #AAFF00;
            --black: #0D0D0D;
            --dark: #151515;
            --white: #FFFFFF;
            --gray: #8A8A8A;
            --gradient-primary: linear-gradient(135deg, #f9a41a 0%, #ef4b23 50%, #c7451e 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--black);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        h1 {
            position: fixed;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Bebas Neue', sans-serif;
            color: var(--white);
            font-size: 1.5rem;
            letter-spacing: 0.1em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            max-width: 1200px;
            width: 100%;
        }

        .stat-card {
            background: var(--dark);
            border-radius: 20px;
            padding: 2.5rem 1.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 1px solid transparent;
            transition: all 0.4s ease;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 20px;
            padding: 2px;
            background: linear-gradient(135deg, var(--glow-color), transparent 50%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.5;
            transition: opacity 0.4s ease;
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4),
                        0 0 60px var(--glow-color-alpha);
        }

        .stat-card:nth-child(1) { --glow-color: var(--orange); --glow-color-alpha: rgba(255, 107, 44, 0.3); }
        .stat-card:nth-child(2) { --glow-color: var(--cyan); --glow-color-alpha: rgba(0, 229, 255, 0.3); }
        .stat-card:nth-child(3) { --glow-color: var(--magenta); --glow-color-alpha: rgba(255, 0, 229, 0.3); }
        .stat-card:nth-child(4) { --glow-color: var(--lime); --glow-color-alpha: rgba(170, 255, 0, 0.3); }

        .stat-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .stat-icon::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--glow-color);
            border-radius: 50%;
            opacity: 0.15;
            filter: blur(15px);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.15; }
            50% { transform: scale(1.3); opacity: 0.25; }
        }

        .stat-icon svg {
            width: 36px;
            height: 36px;
            color: var(--glow-color);
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 0 10px var(--glow-color));
        }

        .stat-number {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            color: var(--white);
            line-height: 1;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px var(--glow-color-alpha);
        }

        .stat-number.animate {
            animation: numberGlow 0.5s ease;
        }

        @keyframes numberGlow {
            0%, 100% { text-shadow: 0 0 20px var(--glow-color-alpha); }
            50% { text-shadow: 0 0 40px var(--glow-color), 0 0 60px var(--glow-color-alpha); }
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        @media (max-width: 900px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 500px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <h1>OPTION 1: NEON GLOW CARDS</h1>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <path d="M3 9h18M9 21V9"/>
                </svg>
            </div>
            <div class="stat-number">25+</div>
            <div class="stat-label">Challenge Rooms</div>
        </div>

        <div class="stat-card">
            <div class="stat-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12,6 12,12 16,14"/>
                </svg>
            </div>
            <div class="stat-number" id="minutes">60</div>
            <div class="stat-label">Minutes of Play</div>
        </div>

        <div class="stat-card">
            <div class="stat-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
            </div>
            <div class="stat-number">2-5</div>
            <div class="stat-label">Players Per Team</div>
        </div>

        <div class="stat-card">
            <div class="stat-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                    <circle cx="12" cy="10" r="3"/>
                </svg>
            </div>
            <div class="stat-number">7</div>
            <div class="stat-label">Global Locations</div>
        </div>
    </div>

    <script>
        // Animate minutes
        const minutesEl = document.getElementById('minutes');
        const options = [60, 90, 120];
        let idx = 0;

        setInterval(() => {
            idx = (idx + 1) % options.length;
            minutesEl.classList.add('animate');
            minutesEl.textContent = options[idx];
            setTimeout(() => minutesEl.classList.remove('animate'), 500);
        }, 2500);
    </script>
</body>
</html>
